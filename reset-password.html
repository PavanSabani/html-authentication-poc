<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <meta name="author" content="Pavan">
    <meta name="keywords" content="reset form">
    <meta name="description" content="html-authentication-poc">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    
    <link rel="stylesheet" href="styles.css" />
    <title>Reset Password</title>
</head>

<body>

    <div class="container d-flex justify-content-center align-items-center auth-container">

        <div class="card auth-card col-md-5">

            <h3 class="text-center mb-4">Reset Password</h3>

            <form onsubmit="goToPage(event, 'login.html')">

                <div class="mb-3">
                    <label class="form-label">New Password</label>
                    <input type="password" class="form-control" placeholder="Enter new password">
                </div>

                <div class="mb-3">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" class="form-control" placeholder="Confirm password">
                </div>

                <button type="submit" class="btn btn-primary w-100">Update Password</button>

            </form>

        </div>

    </div>

    <script>
        function goToPage(event, page) {
            event.preventDefault();
            window.location.href = page;
        }
    </script>

</body>

</html>
