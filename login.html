<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <meta name="author" content="Pavan">
    <meta name="keywords" content="login form">
    <meta name="description" content="html-authentication-poc">
   
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
   
    <link rel="stylesheet" href="styles.css" />
    <title>Login Page</title>
</head>

<body>

    <div class="container d-flex justify-content-center align-items-center auth-container">

        <div class="card auth-card col-md-5">

            <h3 class="text-center mb-4">Login</h3>

            <form onsubmit="goToPage(event, 'dashboard.html')">

                <div class="mb-3">
                    <label class="form-label">Email</label>
                
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-envelope"></i>
                        </span>
                        <input type="email" class="form-control" placeholder="Enter your email">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-lock"></i>
                        </span>
                
                        <input type="password" id="password" class="form-control" placeholder="Enter your password">
                
                        <span class="input-group-text" style="cursor: pointer;" onclick="togglePassword()">
                            <i class="bi bi-eye" id="eyeIcon"></i>
                        </span>
                    </div>
                </div>

                <div class="d-flex justify-content-between mb-3">
                    <a href="forgot-password.html">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    Login
                </button>

                <p class="text-center mt-3">
                    Don't have an account? <a href="register.html">Register</a>
                </p>

            </form>

        </div>

    </div>

    <script>
        function goToPage(event, page) {
            event.preventDefault();
            window.location.href = page;
        }

        function togglePassword() {
            const password = document.getElementById("password");
            const icon = document.getElementById("eyeIcon");

            if (password.type === "password") {
                password.type = "text";
                icon.classList.remove("bi-eye");
                icon.classList.add("bi-eye-slash");
            } else {
                password.type = "password";
                icon.classList.remove("bi-eye-slash");
                icon.classList.add("bi-eye");
            }
        }
    </script>

</body>

</html>
