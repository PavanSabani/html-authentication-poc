<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <meta name="author" content="Pavan">
    <meta name="keywords" content="Registration form">
    <meta name="description" content="html-authentication-poc">
   
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    
   
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
   
    <link rel="stylesheet" href="styles.css" />
    <title>Registration Page</title>
</head>

<body>

    <div class="container d-flex justify-content-center align-items-center auth-container">

        <div class="card auth-card col-md-6 col-lg-5">

            <h3 class="text-center mb-4">Create Account</h3>

            <form onsubmit="goToPage(event, 'login.html')">

               
                <div class="mb-3">
                    <label class="form-label">Name</label>
                    <input type="text" class="form-control" placeholder="Enter your name">
                </div>

                
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" class="form-control" placeholder="Enter your email">
                    </div>
                </div>

                
                <div class="mb-3">
                    <label class="form-label">Phone</label>
                    <input type="tel" class="form-control" placeholder="Enter phone number">
                </div>

                
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" id="regPassword" class="form-control" placeholder="Enter password"
                            onkeyup="checkStrength()">
                    </div>

                    
                    <small id="strengthText"></small>
                </div>

                
                <div class="mb-3">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" class="form-control" placeholder="Confirm password">
                </div>

                <button type="submit" class="btn btn-primary w-100">Register</button>

                <p class="text-center mt-3">
                    Already registered? <a href="login.html">Login</a>
                </p>

            </form>

        </div>

    </div>

    
    <script>
        function goToPage(event, page) {
            event.preventDefault();
            window.location.href = page;
        }

        function checkStrength() {
            const password = document.getElementById("regPassword").value;
            const text = document.getElementById("strengthText");

            if (password.length < 4) {
                text.innerHTML = "Weak";
                text.style.color = "red";
            } else if (password.length < 8) {
                text.innerHTML = "Medium";
                text.style.color = "orange";
            } else {
                text.innerHTML = "Strong";
                text.style.color = "green";
            }
        }
    </script>

</body>

</html>
